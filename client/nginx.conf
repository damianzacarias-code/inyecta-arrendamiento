# nginx.conf — Frontend Inyecta Arrendamiento
#
# Sirve los estáticos producidos por `vite build` y proxya /api/*
# al backend. El backend se resuelve por DNS del orquestador (en
# docker-compose.prod.yml ese hostname es `server`).
#
# Esta config asume que el contenedor escucha en 80 y que el LB
# externo (ALB/nginx upstream/k8s ingress) hace TLS termination.
# Si necesitas TLS dentro del contenedor, agrega un `listen 443 ssl`
# con certs montados como secret.

upstream backend {
  # `server` es el nombre del servicio en docker-compose. En k8s sería
  # un FQDN tipo `inyecta-server.svc.cluster.local`. Para mover a otro
  # entorno basta cambiar este nombre o inyectarlo via configmap.
  server server:3001;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Tamaño máximo de upload — debe coincidir con el límite de multer
  # del backend (PDFs de solicitud, expedientes, conciliación). El
  # body parser de Express está en 1mb (no aplica a multipart).
  client_max_body_size 25M;

  # Compresión básica de texto. Imágenes y PDFs ya vienen comprimidos.
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types
    application/javascript
    application/json
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # ── Proxy al backend ─────────────────────────────────────────
  # Orden importante: este bloque va ANTES del fallback SPA, si no
  # /api/* caería al index.html.
  location /api/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    # X-Request-ID es opcional: si el cliente lo manda, el backend
    # lo respeta (middleware/requestId.ts). Si no, el backend genera
    # uno y lo regresa en el response.
    proxy_set_header X-Request-ID $http_x_request_id;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
  }

  # ── PDFs subidos al backend (uploads/) ───────────────────────
  # Si en el futuro queremos servirlos vía CDN, este location bypassa
  # nginx y va al backend (que los tiene en disco). Igual va con el
  # mismo proxy_pass al servicio backend.
  location /uploads/ {
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # ── Static assets con hash en filename → cache largo ─────────
  # vite produce filenames del tipo `index-DH3jX.js`. Cuando cambia
  # el contenido cambia el hash, así que `immutable` es seguro.
  location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ── SPA fallback ─────────────────────────────────────────────
  # react-router maneja /clientes, /cotizador, /portal/:token, etc.
  # Cualquier path no match → index.html, y el router del cliente
  # toma la decisión.
  location / {
    try_files $uri $uri/ /index.html;
    # No-cache en index.html para que un deploy nuevo se vea sin
    # forzar refresh.
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Healthcheck propio del nginx (lo usa el HEALTHCHECK del Dockerfile).
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
